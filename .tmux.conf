# Terminal / capabilities
set -g default-terminal "tmux-256color"
set -asq terminal-features ",wezterm:RGB:clipboard:focus:extkeys"
set -asq terminal-features ",xterm-256color:RGB"
set -sq extended-keys on
set -sq extended-keys-format csi-u
set -g focus-events on
set -g set-clipboard external
set -sg escape-time 10

# Prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Core behavior
set -g history-limit 50000
set -g mouse on
set -g detach-on-destroy off
set -g status-interval 5
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g allow-rename off
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}:#{pane_current_command}"
setw -g mode-keys vi

# Splits / windows open in the current pane's directory
unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

unbind c
bind c new-window -c "#{pane_current_path}"

# Reload config
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
bind R source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Pane navigation and resizing
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind m resize-pane -Z
bind Tab switch-client -l
bind -r W last-window

# Choosers / search
bind Space choose-tree -Zw
bind f command-prompt -p "find-window" "find-window -Z '%%'"

# Select previous pane
bind-key -r O select-pane -t :.-

# Copy mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi Y send -X select-line \; send -X copy-selection-and-cancel

# Don't exit copy mode after dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Theme
source-file -q ~/.dotfiles/.config/tmux/themes/zenbones-dark.tmux

# Initialize TMUX plugin manager. If TPM is not installed yet, run ./setup.sh.
if-shell 'test -x ~/.tmux/plugins/tpm/tpm' 'run "~/.tmux/plugins/tpm/tpm"' 'display-message "TPM not installed: run ./setup.sh"'
